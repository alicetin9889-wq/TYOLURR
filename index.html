<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İkra 💞</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#111;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.background{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(180deg,#111,#1c1c1c,#ff2e63);
z-index:-3;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
0%{
filter:hue-rotate(0deg);
}
100%{
filter:hue-rotate(20deg);
}
}

.container{
width:90%;
max-width:420px;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(255,255,255,0.15);
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}

button{
margin-top:20px;
padding:14px 22px;
border:none;
border-radius:25px;
font-size:17px;
font-weight:bold;
background:white;
color:#ff2e63;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

img{
width:230px;
border-radius:22px;
margin-top:15px;
box-shadow:0 0 25px rgba(255,255,255,0.2);
animation:floatimg 5s infinite alternate;
}

@keyframes floatimg{
0%{
transform:translateY(0px) rotate(-2deg);
}
100%{
transform:translateY(-10px) rotate(2deg);
}
}

.heart{
position:absolute;
font-size:24px;
opacity:0.6;
animation:heart 8s linear infinite;
}

@keyframes heart{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}

.fb{
position:absolute;
font-size:24px;
opacity:0.4;
animation:rotate 10s linear infinite;
}

@keyframes rotate{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<div class="background"></div>

<div class="heart" style="left:8%">💞</div>
<div class="heart" style="left:25%;animation-delay:2s;">💕</div>
<div class="heart" style="left:45%;animation-delay:4s;">💖</div>
<div class="heart" style="left:65%;animation-delay:1s;">💘</div>
<div class="heart" style="left:85%;animation-delay:5s;">💗</div>

<div class="fb" style="top:20px;right:20px;">💛💙</div>
<div class="fb" style="bottom:20px;left:20px;">💙💛</div>

<div class="container">

<div id="content">

<h1 style="font-size:40px;">
💌 Gizli Dosya
</h1>

<p style="
margin-top:20px;
font-size:19px;
line-height:34px;
">

İkra için hazırlanmış özel doğum günü dosyası açılıyor 💞

</p>

<button onclick="scene1()">
Başlat 💖
</button>

</div>

</div>

<script>

function scene1(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff4d88;">
💖 Mini Test
</h2>

<p style="
margin-top:20px;
font-size:20px;
line-height:34px;
">

Ali'nin en sevmediği şey hangisi? 😭

</p>

<button onclick="wrong()">
İkra'nın trip atması
</button>

<br>

<button onclick="scene2()">
Senin çok konuşman 💞
</button>

`;

}

function wrong(){

alert("Yanlış 😭");
}

function scene2(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff4d88;">
🚗 Hot Wheels Kızı
</h2>

<p style="
margin-top:20px;
font-size:18px;
line-height:34px;
">

Hot Wheels konuşmalarımız,<br>
random mesajların,<br>
saçma kahkahaların 😭<br><br>

İstemeden günümün en güzel kısmı oldu.
</p>

<button onclick="scene3()">
Devam 💌
</button>

`;

}

function scene3(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff4d88;">
💞 Jack & Kate
</h2>

<img src="https://images6.fanpop.com/image/photos/33100000/Kate-and-Jack-lost-33175853-1280-720.jpg">

<p style="
margin-top:20px;
font-size:18px;
line-height:34px;
">

Bak onlar bile sizi onaylıyor 😭💖

</p>

<button onclick="scene4()">
Devam 💕
</button>

`;

}

function scene4(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff4d88;">
💌 Küçük Bir İtiraf
</h2>

<img src="https://wallpapercave.com/wp/wp2735597.jpg">

<p style="
margin-top:20px;
font-size:18px;
line-height:34px;
">

Belki bazen fazla kıskanıyorum 😭<br><br>

Şu mobil oyun olayını sevmememin sebebi bile biraz bu.<br><br>

Çünkü seni diğer insanlardan biraz daha farklı görüyorum 💞
</p>

<button onclick="scene5()">
Devam 💖
</button>

`;

}

function scene5(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff4d88;">
💛💙 Bir Şey Daha
</h2>

<p style="
margin-top:20px;
font-size:19px;
line-height:36px;
">

Fenerbahçeli olmanla 💛💙<br>
yeşil gözlerinle,<br>
beni sinir etmenle,<br>
random oluşunla bile güzelsin 😭💖<br><br>

Ve sanırım...<br><br>

Seninle kurduğum hayalleri kimseyle değişmem.
</p>

<button onclick="finalScene()">
Son Mesaj 💌
</button>

`;

}

function finalScene(){

document.getElementById("content").innerHTML = `

<h1 style="
font-size:42px;
color:#ff4d88;
text-shadow:0 0 20px white;
">

Seni Seviyorum 💞

</h1>

<h2 style="
margin-top:20px;
font-size:30px;
">
İyi ki doğdun İkra
</h2>

<p style="
margin-top:25px;
font-size:20px;
line-height:38px;
">

Bazı insanlar normal biri gibi girer hayatına...<br><br>

Sonra fark etmeden gününün en güzel kısmı olurlar 💖
</p>

<h2 style="
margin-top:35px;
color:#ffe6ee;
">
— Ali
</h2>

`;

}

</script>

</body>
</html>
